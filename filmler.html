<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ne İzlesem? | Filmler</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #0f1117 0%, #1a1d2b 100%); font-family: 'Inter', sans-serif; min-height: 100vh; }
        .main-content { padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: #1e212e; border-radius: 28px; padding: 25px 30px; margin-bottom: 25px; border: 1px solid rgba(255, 107, 0, 0.3); }
        .header h1 { font-size: 28px; color: white; }
        .header h1 i { color: #ff6b00; margin-right: 12px; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .movie-card { background: #1e212e; border-radius: 20px; overflow: hidden; border: 1px solid #2a2e3d; cursor: pointer; transition: 0.3s; }
        .movie-card:hover { border-color: #ff6b00; transform: translateY(-5px); }
        .card-info { padding: 16px; }
        .card-title { font-size: 16px; font-weight: 700; color: white; }
        .card-year { font-size: 11px; color: #6b7280; margin-bottom: 8px; }
        .imdb-rating { background: #ff6b00; color: #000; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; margin-bottom: 8px; }
        .loading-state { text-align: center; padding: 50px; color: #6b7280; }
    </style>
</head>
<body>
<div class="main-content">
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-film"></i> What to Watch? <span style="color:#ffb347;">Abican</span></h1>
            <p>10.000+ film - IMDb Top Rated</p>
        </div>
        <div id="resultsGrid" class="results-grid">
            <div class="loading-state"><i class="fas fa-spinner fa-spin"></i> Filmler yükleniyor...</div>
        </div>
    </div>
</div>

<script>
// JSON'u GitHub'dan çek
fetch('https://raw.githubusercontent.com/bekcispn/ne-izlesem/main/movies.json')
    .then(res => res.json())
    .then(filmler => {
        const grid = document.getElementById("resultsGrid");
        
        // Puanlara göre sırala (yüksekten düşüğe)
        filmler.sort((a, b) => b.vote_average - a.vote_average);
        
        // İlk 100 filmi göster
        const gosterilecekFilmler = filmler.slice(0, 100);
        
        grid.innerHTML = gosterilecekFilmler.map(film => `
            <div class="movie-card">
                <div class="card-info">
                    <div class="card-title">${film.title || film.original_title || "Bilinmiyor"}</div>
                    <div class="card-year">${film.release_date ? film.release_date.split('-')[0] : "Bilinmiyor"}</div>
                    <div class="imdb-rating">⭐ ${film.vote_average || "?"}</div>
                </div>
            </div>
        `).join("");
    })
    .catch(err => {
        document.getElementById("resultsGrid").innerHTML = '<div class="loading-state">❌ Filmler yüklenemedi! JSON dosyasını kontrol et.</div>';
        console.error("Hata:", err);
    });
</script>
</body>
</html>

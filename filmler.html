<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ne İzlesem? | Filmler</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0f1117 0%, #1a1d2b 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .header {
            background: #1e212e;
            border-radius: 28px;
            padding: 25px 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 107, 0, 0.3);
            position: relative;
        }

        .header h1 {
            font-size: 28px;
            color: white;
        }

        .header h1 i {
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-right: 12px;
        }

        .header h1 .highlight {
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            padding: 0 8px;
        }

        .header p {
            color: #9ca3af;
            margin-top: 8px;
            font-size: 14px;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: #2a2e3d;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: #ffb347;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: #ff6b00;
            color: white;
        }

        .category-menu {
            background: #1e212e;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #2a2e3d;
        }

        .category-header {
            margin-bottom: 15px;
            color: #ffb347;
            font-weight: 600;
            font-size: 14px;
        }

        .category-header i {
            margin-right: 8px;
        }

        .category-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .category-btn {
            background: #2a2e3d;
            border: 1px solid #3a3e4d;
            padding: 8px 18px;
            border-radius: 40px;
            color: #9ca3af;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

        .category-btn:hover {
            border-color: #ff6b00;
            color: #ffb347;
        }

        .category-btn.active {
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            border-color: transparent;
            color: #000;
            font-weight: 600;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .results-header h2 {
            font-size: 20px;
            color: white;
        }

        .results-header h2 i {
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-right: 10px;
        }

        .watched-badge {
            background: #2a2e3d;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            color: #ffb347;
        }

        .watched-badge i {
            margin-right: 8px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: #1e212e;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #2a2e3d;
            transition: 0.3s;
            cursor: pointer;
        }

        .movie-card:hover {
            border-color: #ff6b00;
            transform: translateY(-5px);
        }

        .card-poster {
            height: 250px;
            background: linear-gradient(135deg, #1e212e, #2a2e3d);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-poster i {
            font-size: 50px;
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card-info {
            padding: 16px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: white;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-year {
            font-size: 11px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .imdb-rating {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            color: #000;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-detail {
            font-size: 11px;
            color: #9ca3af;
            margin-bottom: 12px;
        }

        .watched-btn {
            width: 100%;
            background: #2a2e3d;
            border: none;
            padding: 8px;
            border-radius: 40px;
            color: #9ca3af;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 12px;
        }

        .watched-btn:hover {
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            color: #000;
        }

        .watched-btn.watched {
            background: #10b981;
            color: white;
            cursor: default;
        }

        .loading-state {
            text-align: center;
            padding: 50px;
            color: #6b7280;
        }

        .loading-state i {
            font-size: 40px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0f1117, #1a1d2b);
            z-index: 1100;
            display: none;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 20px;
        }

        .detail-card {
            background: #1e212e;
            border-radius: 32px;
            max-width: 600px;
            width: 100%;
            border: 1px solid #ff6b00;
            overflow: hidden;
        }

        .detail-poster {
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, #1e212e, #2a2e3d);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .detail-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-poster i {
            font-size: 80px;
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .detail-info {
            padding: 25px;
        }

        .detail-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
        }

        .detail-year {
            color: #9ca3af;
            margin-bottom: 15px;
        }

        .detail-imdb {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .detail-genre, .detail-director, .detail-actors, .detail-plot, .detail-duration {
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .detail-genre i, .detail-director i, .detail-actors i, .detail-plot i, .detail-duration i {
            color: #ff6b00;
            width: 28px;
            margin-right: 8px;
        }

        .detail-watched-btn {
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: 0.2s;
        }

        .detail-watched-btn.watched {
            background: #10b981;
            color: white;
        }

        .close-detail {
            background: #2a2e3d;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #ffb347;
            cursor: pointer;
            margin: 20px 20px 0 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .close-detail:hover {
            background: #ff6b00;
            color: white;
        }

        .main-content {
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .main-content { padding: 12px; }
            .header h1 { font-size: 22px; }
            .results-grid { grid-template-columns: 1fr; }
            .card-poster { height: 200px; }
            .detail-card { margin: 20px; }
            .detail-poster { height: 250px; }
            .detail-title { font-size: 22px; }
            .category-btn { padding: 6px 12px; font-size: 11px; }
        }
    </style>
</head>
<body>

<div id="detailOverlay" class="detail-overlay">
    <div class="detail-card">
        <button class="close-detail" id="closeDetailBtn"><i class="fas fa-arrow-left"></i> Geri Dön</button>
        <div id="detailContent"></div>
    </div>
</div>

<div class="main-content">
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-film"></i> Ne İzlesem? <span class="highlight">Abican</span></h1>
            <p>En yüksek puanlı filmler - IMDB Top Rated</p>
            <a href="index.html" class="back-btn"><i class="fas fa-home"></i> Ana Sayfaya Dön</a>
        </div>

        <div class="category-menu">
            <div class="category-header">
                <i class="fas fa-tags"></i> Kategoriler
            </div>
            <div class="category-wrapper">
                <button class="category-btn active" data-cat="all">🔥 Tümü</button>
                <button class="category-btn" data-cat="Action">⚡ Aksiyon</button>
                <button class="category-btn" data-cat="Comedy">😂 Komedi</button>
                <button class="category-btn" data-cat="Drama">🎭 Dram</button>
                <button class="category-btn" data-cat="Horror">👻 Korku</button>
                <button class="category-btn" data-cat="Sci-Fi">🚀 Bilim Kurgu</button>
                <button class="category-btn" data-cat="Romance">💕 Romantik</button>
                <button class="category-btn" data-cat="Thriller">🔪 Gerilim</button>
                <button class="category-btn" data-cat="Animation">🐭 Animasyon</button>
                <button class="category-btn" data-cat="Crime">🔫 Suç</button>
                <button class="category-btn" data-cat="Fantasy">🐉 Fantastik</button>
            </div>
        </div>

        <div class="results-header">
            <h2 id="resultTitle"><i class="fas fa-star"></i> En Yüksek Puanlı Filmler</h2>
            <div class="watched-badge">
                <i class="fas fa-check-circle"></i>
                <span id="watchedCount">0</span> izledim
            </div>
        </div>

        <div id="resultsGrid" class="results-grid">
            <div class="loading-state"><i class="fas fa-spinner fa-spin"></i> Filmler yükleniyor...</div>
        </div>
    </div>
</div>

<script>
    const OMDB_API_KEY = "aee8123e";
    const OMDB_BASE_URL = "https://www.omdbapi.com/";

    function getDeviceId() {
        try {
            const screenRes = `${screen.width}x${screen.height}`;
            const userAgent = navigator.userAgent;
            const language = navigator.language;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            let str = `${screenRes}|${language}|${timezone}|${userAgent.substring(0, 80)}`;
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(16).substring(0, 8);
        } catch (e) {
            return "default";
        }
    }

    const deviceId = getDeviceId();
    const STORAGE_WATCHED_KEY = `watched_${deviceId}`;
    let watchedIds = [];
    let currentItems = [];
    let currentCategory = "all";
    const cache = {};

    const allMovieIDs = [
        "tt0111161", "tt0068646", "tt0468569", "tt1375666", "tt0133093",
        "tt0167260", "tt0110912", "tt0109830", "tt0120737", "tt0108052",
        "tt0071562", "tt0110357", "tt0080684", "tt0102926", "tt0120815",
        "tt0209144", "tt0118799", "tt0119217", "tt0114369", "tt0137523",
        "tt0088763", "tt0076759", "tt0082971", "tt0099685", "tt0073486"
    ];

    async function fetchMovieByID(imdbID) {
        if (cache[imdbID]) return cache[imdbID];
        try {
            const url = `${OMDB_BASE_URL}?apikey=${OMDB_API_KEY}&i=${imdbID}&plot=short`;
            const response = await fetch(url);
            const data = await response.json();
            if (data && data.Response === "True") {
                cache[imdbID] = data;
                return data;
            }
            return null;
        } catch (error) {
            console.error("Hata:", error);
            return null;
        }
    }

    function matchesCategory(item, category) {
        if (category === "all") return true;
        const genre = item.Genre || "";
        return genre.toLowerCase().includes(category.toLowerCase());
    }

    async function loadAllMovies() {
        const results = [];
        for (const id of allMovieIDs) {
            if (watchedIds.includes(id)) continue;
            const data = await fetchMovieByID(id);
            if (data && matchesCategory(data, currentCategory)) {
                results.push(data);
            }
        }
        currentItems = results;
        renderItems();
    }

    function renderItems() {
        const grid = document.getElementById("resultsGrid");
        if (currentItems.length === 0) {
            grid.innerHTML = `<div class="loading-state"><i class="fas fa-check-circle"></i><br>Bu kategoride izlemediğin film kalmadı! 🎉<br><small>Başka kategori dene</small></div>`;
            return;
        }
        grid.innerHTML = currentItems.map(item => {
            const posterUrl = item.Poster !== "N/A" ? item.Poster : null;
            return `
                <div class="movie-card" data-id="${item.imdbID}">
                    <div class="card-poster">
                        ${posterUrl ? `<img src="${posterUrl}" alt="${item.Title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
                        <i class="fas fa-film" style="display: ${posterUrl ? 'none' : 'flex'}"></i>
                    </div>
                    <div class="card-info">
                        <div class="card-title">${item.Title}</div>
                        <div class="card-year">${item.Year || "Bilinmiyor"}</div>
                        <div class="imdb-rating">⭐ ${item.imdbRating !== "N/A" ? item.imdbRating : "?"}</div>
                        <div class="card-detail">🎬 ${item.Runtime !== "N/A" ? item.Runtime : "Süre bilinmiyor"}</div>
                        <button class="watched-btn" data-id="${item.imdbID}">
                            <i class="fas fa-check-circle"></i> İzledim
                        </button>
                    </div>
                </div>
            `;
        }).join("");

        document.querySelectorAll(".movie-card").forEach(card => {
            card.addEventListener("click", (e) => {
                if (e.target.classList.contains("watched-btn")) return;
                const id = card.getAttribute("data-id");
                const item = currentItems.find(i => i.imdbID === id);
                if (item) showDetail(item);
            });
        });

        document.querySelectorAll(".watched-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const id = btn.getAttribute("data-id");
                if (!btn.classList.contains("watched")) {
                    btn.classList.add("watched");
                    btn.innerHTML = '<i class="fas fa-check"></i> İzledim ✓';
                    watchedIds.push(id);
                    localStorage.setItem(STORAGE_WATCHED_KEY, JSON.stringify(watchedIds));
                    updateWatchedCount();
                    const index = currentItems.findIndex(i => i.imdbID === id);
                    if (index !== -1) {
                        currentItems.splice(index, 1);
                        renderItems();
                    }
                }
            });
        });
    }

    function showDetail(item) {
        const detailOverlay = document.getElementById("detailOverlay");
        const detailContent = document.getElementById("detailContent");
        const posterUrl = item.Poster !== "N/A" ? item.Poster : null;
        const isWatched = watchedIds.includes(item.imdbID);

        detailContent.innerHTML = `
            <div class="detail-poster">
                ${posterUrl ? `<img src="${posterUrl}" alt="${item.Title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
                <i class="fas fa-film" style="display: ${posterUrl ? 'none' : 'flex'}"></i>
            </div>
            <div class="detail-info">
                <div class="detail-title">${item.Title}</div>
                <div class="detail-year">${item.Year || "Bilinmiyor"}</div>
                <div class="detail-imdb">⭐ ${item.imdbRating !== "N/A" ? item.imdbRating : "?"}</div>
                <div class="detail-genre"><i class="fas fa-tag"></i> Tür: ${item.Genre !== "N/A" ? item.Genre : "Bilinmiyor"}</div>
                <div class="detail-duration"><i class="fas fa-clock"></i> Süre: ${item.Runtime !== "N/A" ? item.Runtime : "Bilinmiyor"}</div>
                <div class="detail-director"><i class="fas fa-user"></i> Yönetmen: ${item.Director !== "N/A" ? item.Director : "Bilinmiyor"}</div>
                <div class="detail-actors"><i class="fas fa-users"></i> Oyuncular: ${item.Actors !== "N/A" ? item.Actors.substring(0, 100) + "..." : "Bilinmiyor"}</div>
                <div class="detail-plot"><i class="fas fa-align-left"></i> Konu: ${item.Plot !== "N/A" ? item.Plot : "Bilgi yok"}</div>
                <button class="detail-watched-btn ${isWatched ? 'watched' : ''}" data-id="${item.imdbID}">
                    <i class="fas ${isWatched ? 'fa-check' : 'fa-check-circle'}"></i> ${isWatched ? 'İzledim ✓' : 'İzledim'}
                </button>
            </div>
        `;

        detailOverlay.style.display = "flex";

        const detailBtn = detailContent.querySelector(".detail-watched-btn");
        if (detailBtn) {
            detailBtn.addEventListener("click", (e) => {
                const id = detailBtn.getAttribute("data-id");
                if (!watchedIds.includes(id)) {
                    watchedIds.push(id);
                    localStorage.setItem(STORAGE_WATCHED_KEY, JSON.stringify(watchedIds));
                    updateWatchedCount();
                    detailBtn.classList.add("watched");
                    detailBtn.innerHTML = '<i class="fas fa-check"></i> İzledim ✓';
                    const index = currentItems.findIndex(i => i.imdbID === id);
                    if (index !== -1) {
                        currentItems.splice(index, 1);
                        renderItems();
                    }
                }
            });
        }
    }

    function updateWatchedCount() {
        document.getElementById("watchedCount").innerText = watchedIds.length;
    }

    function loadWatchedData() {
        const saved = localStorage.getItem(STORAGE_WATCHED_KEY);
        watchedIds = saved ? JSON.parse(saved) : [];
        updateWatchedCount();
    }

    document.getElementById("closeDetailBtn").addEventListener("click", () => {
        document.getElementById("detailOverlay").style.display = "none";
    });

    loadWatchedData();
    loadAllMovies();

    document.querySelectorAll(".category-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
            document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.getAttribute("data-cat");
            await loadAllMovies();
        });
    });
</script>
</body>
</html>

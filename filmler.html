<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ne İzlesem? | Filmler</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #0f1117 0%, #1a1d2b 100%); font-family: 'Inter', sans-serif; min-height: 100vh; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(145deg, #0f1117, #1a1d2b); z-index: 2000;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
        }
        .loading-card { background: #1e212e; border-radius: 32px; padding: 50px 60px; text-align: center; border: 1px solid rgba(255, 107, 0, 0.4); animation: fadeInScale 0.4s ease; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .loading-animation i { font-size: 60px; background: linear-gradient(135deg, #ff6b00, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; animation: spin 1.5s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-title { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #ff6b00, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 25px; }
        .loading-msg { color: #9ca3af; font-size: 13px; margin: 8px 0; opacity: 0; animation: slideIn 0.4s ease forwards; }
        .loading-msg i { background: linear-gradient(135deg, #ff6b00, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; width: 25px; margin-right: 8px; }
        .loading-msg:nth-child(1) { animation-delay: 0s; }
        .loading-msg:nth-child(2) { animation-delay: 0.5s; }
        .loading-msg:nth-child(3) { animation-delay: 1s; }
        .loading-msg:nth-child(4) { animation-delay: 1.5s; }
        .loading-msg:nth-child(5) { animation-delay: 2s; }
        .loading-msg:nth-child(6) { animation-delay: 2.5s; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .main-content { padding: 20px; display: none; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: #1e212e; border-radius: 28px; padding: 25px 30px; margin-bottom: 25px; border: 1px solid rgba(255, 107, 0, 0.3); position: relative; }
        .header h1 { font-size: 28px; color: white; }
        .header h1 i { background: linear-gradient(135deg, #ff6b00, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; margin-right: 12px; }
        .header h1 .highlight { background: linear-gradient(135deg, #ff6b00, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; padding: 0 8px; }
        .header p { color: #9ca3af; margin-top: 8px; font-size: 14px; }
        .home-btn { position: absolute; top: 20px; right: 25px; background: #2a2e3d; border: none; padding: 8px 18px; border-radius: 40px; color: #ffb347; cursor: pointer; text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; gap: 8px; }
        .home-btn:hover { background: #ff6b00; color: white; }
        
        .category-menu { background: #1e212e; border-radius: 24px; padding: 20px; margin-bottom: 25px; border: 1px solid #2a2e3d; }
        .category-header { margin-bottom: 15px; color: #ffb347; font-weight: 600; font-size: 14px; }
        .category-wrapper { display: flex; flex-wrap: wrap; gap: 10px; }
        .cat-btn { background: #2a2e3d; border: 1px solid #3a3e4d; padding: 8px 18px; border-radius: 40px; color: #9ca3af; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .cat-btn:hover { border-color: #ff6b00; color: #ffb347; }
        .cat-btn.active { background: linear-gradient(135deg, #ff6b00, #ffb347); border-color: transparent; color: #000; font-weight: 600; }
        
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .results-header h2 { font-size: 20px; color: white; display: flex; align-items: center; gap: 12px; }
        .results-header h2 i { background: linear-gradient(135deg, #ff6b00, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; margin-right: 10px; }
        .item-count-badge { background: #ff6b00; color: #000; padding: 4px 12px; border-radius: 40px; font-size: 14px; font-weight: 700; }
        .watched-badge { background: #2a2e3d; padding: 8px 18px; border-radius: 40px; font-size: 13px; color: #ffb347; }
        
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .movie-card { background: #1e212e; border-radius: 20px; overflow: hidden; border: 1px solid #2a2e3d; transition: 0.3s; cursor: pointer; }
        .movie-card:hover { border-color: #ff6b00; transform: translateY(-5px); }
        .card-poster { height: 180px; background: linear-gradient(135deg, #1e212e, #2a2e3d); display: flex; align-items: center; justify-content: center; }
        .card-poster i { font-size: 50px; background: linear-gradient(135deg, #ff6b00, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .card-info { padding: 16px; }
        .card-title { font-size: 16px; font-weight: 700; color: white; margin-bottom: 5px; }
        .card-year { font-size: 11px; color: #6b7280; margin-bottom: 8px; }
        .imdb-rating { display: inline-block; background: linear-gradient(135deg, #ff6b00, #ffb347); color: #000; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 8px; }
        .card-detail { font-size: 11px; color: #9ca3af; margin-bottom: 12px; }
        .watched-btn { width: 100%; background: #2a2e3d; border: none; padding: 8px; border-radius: 40px; color: #9ca3af; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 12px; }
        .watched-btn:hover { background: linear-gradient(135deg, #ff6b00, #ffb347); color: #000; }
        .watched-btn.watched { background: #10b981; color: white; cursor: default; }
        .loading-state { text-align: center; padding: 50px; color: #6b7280; }
        
        .detail-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(145deg, #0f1117, #1a1d2b); z-index: 1100;
            display: none; justify-content: center; align-items: center; overflow-y: auto; padding: 20px;
        }
        .detail-card {
            background: #1e212e; border-radius: 32px; max-width: 600px; width: 100%;
            border: 2px solid #ff6b00; overflow: hidden;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .detail-back-btn {
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            border: none; padding: 12px 24px; border-radius: 50px;
            color: #000; font-weight: 700; cursor: pointer; margin: 20px 20px 0 20px;
            display: inline-flex; align-items: center; gap: 10px; font-size: 16px;
            transition: 0.2s; width: calc(100% - 40px);
            justify-content: center;
        }
        .detail-back-btn:hover { background: #ffb347; transform: scale(0.98); }
        .detail-poster { width: 100%; height: 300px; background: linear-gradient(135deg, #1e212e, #2a2e3d); display: flex; align-items: center; justify-content: center; }
        .detail-poster i { font-size: 80px; background: linear-gradient(135deg, #ff6b00, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .detail-info { padding: 25px; }
        .detail-title { font-size: 28px; font-weight: 700; color: white; margin-bottom: 10px; }
        .detail-year { color: #9ca3af; margin-bottom: 15px; }
        .detail-imdb { display: inline-block; background: linear-gradient(135deg, #ff6b00, #ffb347); color: #000; padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: 700; margin-bottom: 15px; }
        .detail-genre, .detail-plot, .detail-duration { color: #cbd5e1; font-size: 14px; margin-bottom: 12px; line-height: 1.5; }
        .detail-genre i, .detail-plot i, .detail-duration i { color: #ff6b00; width: 28px; margin-right: 8px; }
        .detail-watched-btn { background: linear-gradient(135deg, #ff6b00, #ffb347); border: none; padding: 12px 24px; border-radius: 40px; color: #000; font-weight: 700; cursor: pointer; margin-top: 20px; width: 100%; transition: 0.2s; }
        .detail-watched-btn.watched { background: #10b981; color: white; }
        
        @media (max-width: 768px) {
            .main-content { padding: 12px; }
            .header h1 { font-size: 22px; }
            .results-grid { grid-template-columns: 1fr; }
            .card-poster { height: 150px; }
            .detail-card { margin: 20px; }
            .detail-poster { height: 200px; }
            .cat-btn { padding: 6px 12px; font-size: 11px; }
            .loading-card { padding: 30px 25px; margin: 20px; }
        }
    </style>
</head>
<body>

<div id="loadingScreen" class="loading-overlay">
    <div class="loading-card">
        <div class="loading-animation"><i class="fas fa-film"></i></div>
        <div class="loading-title">Filmler hazırlanıyor...</div>
        <div class="loading-messages">
            <div class="loading-msg"><i class="fas fa-database"></i> 600 bin film taranıyor...</div>
            <div class="loading-msg"><i class="fas fa-star"></i> IMDb puanları toplanıyor...</div>
            <div class="loading-msg"><i class="fas fa-trophy"></i> En iyi filmler seçiliyor...</div>
            <div class="loading-msg"><i class="fas fa-check-circle"></i> Hazır! Yönlendiriliyor...</div>
        </div>
    </div>
</div>

<div id="detailOverlay" class="detail-overlay">
    <div class="detail-card">
        <button class="detail-back-btn" id="closeDetailBtn"><i class="fas fa-arrow-left"></i> ← GERİ DÖN</button>
        <div id="detailContent"></div>
    </div>
</div>

<div id="mainContent" class="main-content">
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-film"></i> What to Watch? <span class="highlight">Abican</span></h1>
            <p>600.000+ film - IMDb Top Rated</p>
            <a href="index.html" class="home-btn"><i class="fas fa-home"></i> Ana Sayfa</a>
        </div>

        <div class="category-menu">
            <div class="category-header"><i class="fas fa-tags"></i> Kategoriler</div>
            <div class="category-wrapper">
                <button class="cat-btn active" data-cat="all">🔥 Tümü</button>
                <button class="cat-btn" data-cat="Action">⚡ Aksiyon</button>
                <button class="cat-btn" data-cat="Comedy">😂 Komedi</button>
                <button class="cat-btn" data-cat="Drama">🎭 Dram</button>
                <button class="cat-btn" data-cat="Horror">👻 Korku</button>
                <button class="cat-btn" data-cat="Sci-Fi">🚀 Bilim Kurgu</button>
                <button class="cat-btn" data-cat="Romance">💕 Romantik</button>
                <button class="cat-btn" data-cat="Thriller">🔪 Gerilim</button>
                <button class="cat-btn" data-cat="Animation">🐭 Animasyon</button>
                <button class="cat-btn" data-cat="Crime">🔫 Suç</button>
                <button class="cat-btn" data-cat="Fantasy">🐉 Fantastik</button>
            </div>
        </div>

        <div class="results-header">
            <h2 id="resultTitle">
                <i class="fas fa-star"></i> En Yüksek Puanlı Filmler
                <span class="item-count-badge" id="itemCount">0</span>
            </h2>
            <div class="watched-badge"><i class="fas fa-check-circle"></i><span id="watchedCount">0</span> izledim</div>
        </div>

        <div id="resultsGrid" class="results-grid">
            <div class="loading-state"><i class="fas fa-spinner fa-spin"></i> Filmler yükleniyor...</div>
        </div>
    </div>
</div>

<script>
    // JSON DOSYANIN LİNKİ - BUNU KENDİ GITHUB LİNKİNLE DEĞİŞTİR!
    const JSON_URL = 'https://raw.githubusercontent.com/bekcispn/ne-izlesem/main/movies_batch_1.json';
    
    let allMovies = [];
    let filteredMovies = [];
    let watchedIds = [];
    let currentCategory = "all";
    
    const deviceId = localStorage.getItem('deviceId') || Math.random().toString(36).substring(2, 10);
    localStorage.setItem('deviceId', deviceId);
    const STORAGE_KEY = `watched_${deviceId}`;
    
    function formatRuntime(seconds) {
        if (!seconds || seconds === 0) return "Süre bilinmiyor";
        const hours = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        if (hours > 0) return `${hours}s ${mins}dk`;
        return `${mins}dk`;
    }
    
    function loadWatchedData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        watchedIds = saved ? JSON.parse(saved) : [];
        document.getElementById("watchedCount").innerText = watchedIds.length;
    }
    
    function saveWatchedData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(watchedIds));
        document.getElementById("watchedCount").innerText = watchedIds.length;
    }
    
    function filterByCategory() {
        if (currentCategory === "all") {
            filteredMovies = [...allMovies];
        } else {
            filteredMovies = allMovies.filter(movie => {
                const genres = movie.genres?.genres?.map(g => g.text) || [];
                return genres.some(g => g.toLowerCase().includes(currentCategory.toLowerCase()));
            });
        }
        filteredMovies.sort((a, b) => (b.ratingsSummary?.aggregateRating || 0) - (a.ratingsSummary?.aggregateRating || 0));
        renderMovies();
    }
    
    function renderMovies() {
        const grid = document.getElementById("resultsGrid");
        const countSpan = document.getElementById("itemCount");
        
        const unwatchedMovies = filteredMovies.filter(m => !watchedIds.includes(m.id));
        
        if (unwatchedMovies.length === 0) {
            grid.innerHTML = `<div class="loading-state"><i class="fas fa-check-circle"></i><br>Bu kategoride izlemediğin film kalmadı! 🎉<br><small>Başka kategori dene</small></div>`;
            countSpan.innerText = "0";
            return;
        }
        
        countSpan.innerText = unwatchedMovies.length;
        
        grid.innerHTML = unwatchedMovies.slice(0, 100).map(movie => {
            const title = movie.titleText?.text || "Bilinmiyor";
            const year = movie.releaseYear?.year || "?";
            const rating = movie.ratingsSummary?.aggregateRating || "?";
            const runtime = formatRuntime(movie.runtime);
            const genres = movie.genres?.genres?.map(g => g.text).slice(0, 2).join(", ") || "Genel";
            
            return `
                <div class="movie-card" data-id="${movie.id}">
                    <div class="card-poster">
                        <i class="fas fa-film"></i>
                    </div>
                    <div class="card-info">
                        <div class="card-title">${title}</div>
                        <div class="card-year">${year}</div>
                        <div class="imdb-rating">⭐ ${rating}</div>
                        <div class="card-detail">🎬 ${runtime} | ${genres}</div>
                        <button class="watched-btn" data-id="${movie.id}">
                            <i class="fas fa-check-circle"></i> İzledim
                        </button>
                    </div>
                </div>
            `;
        }).join("");
        
        attachCardEvents();
        attachWatchedEvents();
    }
    
    function attachCardEvents() {
        document.querySelectorAll(".movie-card").forEach(card => {
            card.removeEventListener("click", card.clickHandler);
            card.clickHandler = (e) => {
                if (e.target.classList.contains("watched-btn")) return;
                const id = card.getAttribute("data-id");
                const movie = allMovies.find(m => m.id === id);
                if (movie) showDetail(movie);
            };
            card.addEventListener("click", card.clickHandler);
        });
    }
    
    function attachWatchedEvents() {
        document.querySelectorAll(".watched-btn").forEach(btn => {
            btn.removeEventListener("click", btn.clickHandler);
            btn.clickHandler = (e) => {
                e.stopPropagation();
                const id = btn.getAttribute("data-id");
                if (!btn.classList.contains("watched")) {
                    btn.classList.add("watched");
                    btn.innerHTML = '<i class="fas fa-check"></i> İzledim ✓';
                    watchedIds.push(id);
                    saveWatchedData();
                    renderMovies();
                }
            };
            btn.addEventListener("click", btn.clickHandler);
        });
    }
    
    function showDetail(movie) {
        const detailOverlay = document.getElementById("detailOverlay");
        const detailContent = document.getElementById("detailContent");
        const title = movie.titleText?.text || "Bilinmiyor";
        const year = movie.releaseYear?.year || "?";
        const rating = movie.ratingsSummary?.aggregateRating || "?";
        const runtime = formatRuntime(movie.runtime);
        const genres = movie.genres?.genres?.map(g => g.text).join(", ") || "Genel";
        const plot = movie.plot?.plotText?.plainText || "Konu bilgisi yok";
        const isWatched = watchedIds.includes(movie.id);
        
        detailContent.innerHTML = `
            <div class="detail-poster">
                <i class="fas fa-film"></i>
            </div>
            <div class="detail-info">
                <div class="detail-title">${title}</div>
                <div class="detail-year">${year}</div>
                <div class="detail-imdb">⭐ ${rating}</div>
                <div class="detail-genre"><i class="fas fa-tag"></i> Tür: ${genres}</div>
                <div class="detail-duration"><i class="fas fa-clock"></i> Süre: ${runtime}</div>
                <div class="detail-plot"><i class="fas fa-align-left"></i> Konu: ${plot}</div>
                <button class="detail-watched-btn ${isWatched ? 'watched' : ''}" data-id="${movie.id}">
                    <i class="fas ${isWatched ? 'fa-check' : 'fa-check-circle'}"></i> ${isWatched ? 'İzledim ✓' : 'İzledim'}
                </button>
            </div>
        `;
        
        detailOverlay.style.display = "flex";
        
        const detailBtn = detailContent.querySelector(".detail-watched-btn");
        if (detailBtn) {
            detailBtn.removeEventListener("click", detailBtn.clickHandler);
            detailBtn.clickHandler = (e) => {
                const id = detailBtn.getAttribute("data-id");
                if (!watchedIds.includes(id)) {
                    watchedIds.push(id);
                    saveWatchedData();
                    detailBtn.classList.add("watched");
                    detailBtn.innerHTML = '<i class="fas fa-check"></i> İzledim ✓';
                    renderMovies();
                }
            };
            detailBtn.addEventListener("click", detailBtn.clickHandler);
        }
    }
    
    // JSON'u yükle
    fetch(JSON_URL)
        .then(res => {
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        })
        .then(data => {
            allMovies = data;
            filterByCategory();
            setTimeout(() => {
                document.getElementById("loadingScreen").style.display = "none";
                document.getElementById("mainContent").style.display = "block";
            }, 2000);
        })
        .catch(err => {
            console.error("JSON yüklenemedi:", err);
            document.getElementById("resultsGrid").innerHTML = `<div class="loading-state">❌ Filmler yüklenemedi!<br><br>Hata: ${err.message}<br><br>Link: ${JSON_URL}</div>`;
            setTimeout(() => {
                document.getElementById("loadingScreen").style.display = "none";
                document.getElementById("mainContent").style.display = "block";
            }, 2000);
        });
    
    loadWatchedData();
    
    document.getElementById("closeDetailBtn").addEventListener("click", () => {
        document.getElementById("detailOverlay").style.display = "none";
    });
    
    document.querySelectorAll(".cat-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.getAttribute("data-cat");
            filterByCategory();
        });
    });
</script>
</body>
</html>

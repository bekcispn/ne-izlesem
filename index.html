<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ne İzlesem? | Ana Sayfa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0f1117 0%, #1a1d2b 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }

        .header h1 i {
            background: none;
            -webkit-background-clip: unset;
            color: #ff6b00;
        }

        .header p {
            color: #9ca3af;
            font-size: 18px;
        }

        .choice-cards {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .choice-card {
            flex: 1;
            min-width: 250px;
            max-width: 350px;
            background: #1e212e;
            border-radius: 32px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #2a2e3d;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
        }

        .choice-card:hover {
            border-color: #ff6b00;
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255, 107, 0, 0.2);
        }

        .choice-icon i {
            font-size: 70px;
            background: linear-gradient(135deg, #ff6b00, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .choice-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
        }

        .choice-desc {
            color: #9ca3af;
            font-size: 14px;
        }

        .badge-date {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 107, 0, 0.2);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            color: #ffb347;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }
            .choice-card {
                padding: 35px 20px;
            }
            .choice-icon i {
                font-size: 50px;
            }
            .choice-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-ticket-alt"></i> Ne İzlesem? <span style="background: none; color:#ffb347;">Abican</span></h1>
            <p>Ne izlemek istiyorsun? Seçimini yap!</p>
        </div>

        <div class="choice-cards">
            <a href="filmler.html" class="choice-card">
                <div class="choice-icon"><i class="fas fa-film"></i></div>
                <div class="choice-title">Filmler</div>
                <div class="choice-desc">En yüksek puanlı filmler • IMDB Top Rated</div>
            </a>
            <a href="diziler.html" class="choice-card">
                <div class="choice-icon"><i class="fas fa-tv"></i></div>
                <div class="choice-title">Diziler</div>
                <div class="choice-desc">En yüksek puanlı diziler • IMDB Top Rated</div>
            </a>
        </div>

        <div class="badge-date">
            <i class="fas fa-film"></i> Abican için özel
        </div>
    </div>
</body>
</html>
